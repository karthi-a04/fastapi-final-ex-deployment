apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: fastapi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: karthianbazhagan4/fastapi-app:3b80bdd1
          ports:
            - containerPort: 80
          env:
            - name: SERVICE_NAME
              value: "app1"
