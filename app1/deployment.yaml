apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app1
  namespace: fastapi-app
  labels:
    app: fastapi
    service: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
      service: app1
  template:
    metadata:
      labels:
        app: fastapi
        service: app1
    spec:
      containers:
        - name: fastapi-app1
          image: karthianbazhagan4/fastapi-app:latest
          ports:
            - containerPort: 80
          env:
            - name: SERVICE_NAME
              value: app1
